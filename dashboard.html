<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elate CP Contest – Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A96E;
      --gold-light: #E8D5A3;
      --gold-dark: #A07840;
      --cream: #FAF7F2;
      --dark: #1A1612;
      --dark-mid: #2E2820;
      --muted: #7A6E62;
      --surface: #ffffff;
      --border: rgba(201,169,110,0.2);
      --danger: #C0392B;
      --success: #2ECC71;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F5F1EB;
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 24px;
    }

    .login-box {
      background: var(--dark-mid);
      border: 1px solid var(--border);
      border-top: 3px solid var(--gold);
      border-radius: 4px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--gold-light);
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .login-box input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      letter-spacing: 0.12em;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .login-box input[type="password"]:focus { border-color: var(--gold); }

    .login-error {
      font-size: 12px;
      color: #E57373;
      margin-bottom: 12px;
      min-height: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-gold {
      background: var(--gold);
      color: var(--dark);
      width: 100%;
    }
    .btn-gold:hover { background: var(--gold-light); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dark);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold-dark); }

    .btn-danger {
      background: transparent;
      border: 1px solid rgba(192,57,43,0.4);
      color: var(--danger);
      padding: 8px 16px;
      font-size: 11px;
    }
    .btn-danger:hover { background: rgba(192,57,43,0.08); }

    .btn-sm {
      padding: 7px 14px;
      font-size: 11px;
    }

    /* ── DASHBOARD LAYOUT ── */
    #app { display: none; }
    #app.visible { display: block; }

    .topbar {
      background: var(--dark);
      border-bottom: 2px solid var(--gold-dark);
      padding: 0 32px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--gold-light);
    }
    .topbar-brand span {
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-left: 12px;
      text-transform: uppercase;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(250,247,242,0.15);
      color: rgba(250,247,242,0.5);
      padding: 7px 16px;
      font-size: 11px;
      letter-spacing: 0.08em;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

    .main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px 24px;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--dark);
      line-height: 1;
    }

    /* ── ADD FORM ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .panel-header {
      background: var(--dark);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      color: var(--gold-light);
    }

    .panel-body {
      padding: 28px 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    @media (max-width: 680px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid .btn { grid-column: span 2; }
      .org-field { grid-column: span 2; }
    }

    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(122,110,98,0.25);
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--dark);
      background: #FDFBF8;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--gold); }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr { background: #F9F6F2; }

    thead th {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(122,110,98,0.1);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(201,169,110,0.04); }

    tbody td {
      padding: 14px 20px;
      vertical-align: middle;
    }

    .rank-pill {
      display: inline-block;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 700;
    }
    .rank-1 { background: #C9A96E; color: #1A1612; }
    .rank-2 { background: #A8B8C8; color: #1A1612; }
    .rank-3 { background: #C4A882; color: #1A1612; }
    .rank-4 { background: #8BA89A; color: #1A1612; }
    .rank-other { background: rgba(122,110,98,0.12); color: var(--muted); }

    .inline-edit {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .inline-edit input {
      width: 80px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--dark);
      text-align: right;
      outline: none;
    }
    .inline-edit input:focus { border-color: var(--gold); }

    .org-cell {
      font-weight: 500;
      min-width: 160px;
    }

    .action-btns { display: flex; gap: 8px; white-space: nowrap; }

    /* ── SAVE BANNER ── */
    .save-bar {
      position: sticky;
      bottom: 0;
      background: var(--dark);
      border-top: 2px solid var(--gold);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .save-bar p {
      font-size: 13px;
      color: rgba(250,247,242,0.6);
    }

    .save-bar-actions { display: flex; gap: 12px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 80px;
      right: 24px;
      background: var(--dark-mid);
      border-left: 3px solid var(--gold);
      padding: 14px 20px;
      font-size: 13px;
      color: var(--cream);
      border-radius: 2px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .empty-hint {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    /* preview link */
    .preview-link {
      font-size: 11px;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.05em;
      border-bottom: 1px dashed rgba(201,169,110,0.4);
    }
    .preview-link:hover { border-bottom-color: var(--gold); }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">Elate Residences</div>
      <div class="login-sub">CP Contest · Admin</div>
      <input type="password" id="pwd-input" placeholder="Enter password" autocomplete="current-password" />
      <div class="login-error" id="login-error"></div>
      <button class="btn btn-gold" onclick="doLogin()">Sign In</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app">

    <div class="topbar">
      <div class="topbar-brand">
        Elate Residences
        <span>CP Contest Dashboard</span>
      </div>
      <div class="topbar-actions">
        <a href="index.html" target="_blank" class="preview-link">↗ View Live LP</a>
        <button class="btn-logout" onclick="doLogout()">Log Out</button>
      </div>
    </div>

    <div class="main">

      <!-- STATS STRIP -->
      <div class="stats-strip" id="stats-strip">
        <div class="stat-card">
          <div class="stat-label">Total CPs</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Visits</div>
          <div class="stat-value" id="stat-visits">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Bookings</div>
          <div class="stat-value" id="stat-bookings">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Qualified (≥7 bookings)</div>
          <div class="stat-value" id="stat-qualified">0</div>
        </div>
      </div>

      <!-- ADD NEW CP -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Add Channel Partner</div>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <div class="field org-field">
              <label>Organisation Name</label>
              <input type="text" id="new-org" placeholder="e.g. Horizon Realty Pvt Ltd" />
            </div>
            <div class="field">
              <label>Site Visits</label>
              <input type="number" id="new-visits" placeholder="0" min="0" />
            </div>
            <div class="field">
              <label>Bookings</label>
              <input type="number" id="new-bookings" placeholder="0" min="0" />
            </div>
            <button class="btn btn-gold" onclick="addEntry()">+ Add</button>
          </div>
        </div>
      </div>

      <!-- LEADERBOARD EDITOR -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Leaderboard</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Organisation</th>
                <th>Site Visits</th>
                <th>Bookings</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admin-table-body">
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /main -->

    <!-- SAVE BAR -->
    <div class="save-bar">
      <p id="save-status">No unsaved changes.</p>
      <div class="save-bar-actions">
        <button class="btn btn-outline" onclick="discardChanges()">Discard</button>
        <button class="btn btn-gold" onclick="saveChanges()">💾 Save &amp; Publish</button>
      </div>
    </div>

  </div><!-- /app -->

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ─── CONFIG ───────────────────────────────────────────────────────────────
    // Change this password before deploying!
    const ADMIN_PASSWORD = 'elate2026';
    const STORAGE_KEY    = 'elate_cp_leaderboard';
    const SESSION_KEY    = 'elate_admin_session';
    // ─────────────────────────────────────────────────────────────────────────

    let workingData = [];  // unsaved working copy
    let dirty = false;

    // ── AUTH ──
    function doLogin() {
      const pwd = document.getElementById('pwd-input').value;
      if (pwd === ADMIN_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.add('visible');
        loadData();
      } else {
        document.getElementById('login-error').textContent = 'Incorrect password. Please try again.';
        document.getElementById('pwd-input').value = '';
      }
    }

    function doLogout() {
      sessionStorage.removeItem(SESSION_KEY);
      location.reload();
    }

    document.getElementById('pwd-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    // Auto-login if session active
    if (sessionStorage.getItem(SESSION_KEY)) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }

    // ── DATA ──
    function loadData() {
      let saved = null;
      try { saved = localStorage.getItem(STORAGE_KEY); } catch(e) {}
      if (saved) {
        try {
          const p = JSON.parse(saved);
          workingData = JSON.parse(JSON.stringify(p.entries || []));
        } catch(e) { workingData = []; }
      } else {
        workingData = [];
      }
      dirty = false;
      render();
    }

    function sortData(arr) {
      return [...arr].sort((a, b) => {
        if (b.bookings !== a.bookings) return b.bookings - a.bookings;
        return b.visits - a.visits;
      });
    }

    function render() {
      const sorted = sortData(workingData);
      const tbody = document.getElementById('admin-table-body');
      tbody.innerHTML = '';

      if (sorted.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-hint">No channel partners yet. Add one above.</div></td></tr>`;
      } else {
        sorted.forEach((cp, i) => {
          const rank = i + 1;
          const rankClass = rank <= 4 ? `rank-${rank}` : 'rank-other';
          const origIndex = workingData.indexOf(cp);
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="rank-pill ${rankClass}">${rank}</span></td>
            <td class="org-cell">${escapeHtml(cp.org)}</td>
            <td>
              <div class="inline-edit">
                <input type="number" min="0" value="${cp.visits}"
                  onchange="updateField(${origIndex}, 'visits', this.value)" />
              </div>
            </td>
            <td>
              <div class="inline-edit">
                <input type="number" min="0" value="${cp.bookings}"
                  onchange="updateField(${origIndex}, 'bookings', this.value)" />
              </div>
            </td>
            <td>
              <div class="action-btns">
                <button class="btn btn-danger btn-sm" onclick="removeEntry(${origIndex})">✕ Remove</button>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      updateStats(sorted);
      updateSaveBar();
    }

    function updateStats(sorted) {
      const total    = sorted.length;
      const visits   = sorted.reduce((s, c) => s + Number(c.visits), 0);
      const bookings = sorted.reduce((s, c) => s + Number(c.bookings), 0);
      const qual     = sorted.filter(c => Number(c.bookings) >= 7).length;
      document.getElementById('stat-total').textContent    = total;
      document.getElementById('stat-visits').textContent   = visits.toLocaleString();
      document.getElementById('stat-bookings').textContent = bookings.toLocaleString();
      document.getElementById('stat-qualified').textContent = qual;
    }

    function updateSaveBar() {
      const el = document.getElementById('save-status');
      el.textContent = dirty
        ? '⚠ You have unsaved changes.'
        : 'All changes saved and published.';
      el.style.color = dirty ? '#E8B96E' : 'rgba(250,247,242,0.5)';
    }

    function markDirty() {
      dirty = true;
      updateSaveBar();
    }

    // ── CRUD ──
    function addEntry() {
      const org      = document.getElementById('new-org').value.trim();
      const visits   = parseInt(document.getElementById('new-visits').value)   || 0;
      const bookings = parseInt(document.getElementById('new-bookings').value) || 0;
      if (!org) { showToast('Please enter an organisation name.'); return; }
      workingData.push({ org, visits, bookings });
      document.getElementById('new-org').value      = '';
      document.getElementById('new-visits').value   = '';
      document.getElementById('new-bookings').value = '';
      markDirty();
      render();
    }

    function updateField(index, field, value) {
      workingData[index][field] = parseInt(value) || 0;
      markDirty();
      render();
    }

    function removeEntry(index) {
      if (!confirm(`Remove "${workingData[index].org}"?`)) return;
      workingData.splice(index, 1);
      markDirty();
      render();
    }

    function saveChanges() {
      const payload = {
        entries: workingData,
        updatedAt: new Date().toISOString()
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        dirty = false;
        render();
        showToast('✓ Published to live leaderboard!');
      } catch(e) {
        showToast('Error saving. Storage may be full.');
      }
    }

    function discardChanges() {
      if (!confirm('Discard all unsaved changes?')) return;
      loadData();
    }

    // ── HELPERS ──
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Init
    if (sessionStorage.getItem(SESSION_KEY)) loadData();
  </script>
</body>
</html>
